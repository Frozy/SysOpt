<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Performance Optimizer</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #001f3f 0%, #000 100%);
            color: white; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        /* Анимированный фон */
        .ball { position: absolute; border-radius: 50%; filter: blur(60px); z-index: 0; opacity: 0.3; animation: move 20s linear infinite; }
        .b1 { width: 300px; height: 300px; background: #0074D9; left: -10%; top: 10%; }
        .b2 { width: 250px; height: 250px; background: #7FDBFF; right: -5%; bottom: 10%; animation-delay: -5s; }
        @keyframes move { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(100px, 50px); } }

        .glass {
            position: relative; z-index: 10; background: rgba(255, 255, 255, 0.05);
            border-radius: 30px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; text-align: center; width: 85%; max-width: 380px;
        }
        
        .btn {
            background: linear-gradient(135deg, #0074D9, #2ECC40); border: none; padding: 16px;
            border-radius: 15px; color: white; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px;
        }

        /* АДМИНКА */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #080808; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .device-card { background: #151515; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }

        /* ЭМУЛЯТОР С МАСШТАБИРОВАНИЕМ */
        .emulator {
            width: 240px; height: 400px; background: #000; margin: 20px auto;
            position: relative; border: 2px solid #444; border-radius: 20px; overflow: hidden;
        }
        #dragContainer { position: absolute; width: 100px; transform: translate(-50%, -50%); touch-action: none; border: 1px dashed rgba(255,255,255,0.3); }
        #dragImg { width: 100%; display: block; pointer-events: none; }
        
        /* Кружки для изменения размера */
        .resizer {
            position: absolute; width: 15px; height: 15px; background: #0074D9;
            border-radius: 50%; bottom: -7px; right: -7px; cursor: nwse-resize;
        }

        #trollImage { position: fixed; z-index: 99999; display: none; pointer-events: none; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div class="ball b1"></div>
    <div class="ball b2"></div>

    <div class="glass" id="userView">
        <div id="secretArea">
            <h2 id="secretTrigger" style="user-select:none;">SYSTEM OPTIMIZER</h2>
            <div style="width: 40px; height: 3px; background: #0074D9; margin: 5px auto 20px;"></div>
        </div>
        <p style="color: #aaa; font-size: 14px;">Нажмите для калибровки системы</p>
        <button class="btn" onclick="askPermission()">Оптимизировать</button>
    </div>

    <div id="adminPanel">
        <h2 style="color:#7FDBFF">ROOT TERMINAL</h2>
        <div id="deviceList">Ожидание подключений...</div>
        <div id="ctrl" style="display:none;">
            <label class="btn" style="display:block; text-align:center; background: #333;">ВЫБРАТЬ ФОТО <input type="file" id="fileIn" accept="image/*" onchange="loadImg(this)" style="display:none"></label>
            <div class="emulator" id="emul">
                <div id="dragContainer" style="left:50%; top:50%; display:none;">
                    <img id="dragImg">
                    <div class="resizer" id="resizeHandle"></div>
                </div>
            </div>
            <button class="btn" onclick="fire()" style="background: #FF4136">ЗАПУСТИТЬ</button>
            <button class="btn" style="background:transparent; border:1px solid #444;" onclick="location.reload()">ВЫХОД</button>
        </div>
    </div>

    <img id="trollImage">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBoC20eVfGmSpZC-XfE1hF8NNmpaNEmgh8",
            authDomain: "testing-c051b.firebaseapp.com",
            projectId: "testing-c051b",
            storageBucket: "testing-c051b.firebasestorage.app",
            messagingSenderId: "731747096034",
            appId: "1:731747096034:web:e78d5c06e63ff0dd5395bb",
            databaseURL: "https://testing-c051b-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = "node_" + Math.random().toString(36).substr(2, 5);
        let selectedId = null, b64 = null, curX = 50, curY = 50, curW = 100;

        // Вход в админку
        let clicks = 0;
        document.getElementById('secretArea').onclick = () => {
            clicks++;
            if(clicks >= 3) {
                if(prompt("Code:") === "49231") { document.getElementById('adminPanel').style.display = 'block'; loadDevices(); }
                clicks = 0;
            }
        };

        function askPermission() {
            db.ref('devices/' + myId).set({ name: "User_" + myId, online: true });
            alert("Готово!");
        }

        function loadDevices() {
            db.ref('devices').on('value', s => {
                const list = document.getElementById('deviceList');
                list.innerHTML = "";
                s.forEach(child => {
                    if(child.key === myId) return;
                    let d = document.createElement('div');
                    d.className = "device-card";
                    d.innerHTML = `📡 <b>${child.val().name}</b>`;
                    d.onclick = () => { selectedId = child.key; document.getElementById('ctrl').style.display = 'block'; };
                    list.appendChild(d);
                });
            });
        }

        function loadImg(input) {
            const r = new FileReader();
            r.onload = e => {
                b64 = e.target.result;
                const cont = document.getElementById('dragContainer');
                document.getElementById('dragImg').src = b64;
                cont.style.display = 'block';
            };
            r.readAsDataURL(input.files[0]);
        }

        // Логика перемещения и изменения размера
        const cont = document.getElementById('dragContainer');
        const handle = document.getElementById('resizeHandle');
        const emul = document.getElementById('emul');

        emul.ontouchmove = e => {
            if (e.target === handle) {
                // Изменение размера
                let t = e.touches[0], rect = cont.getBoundingClientRect();
                curW = t.clientX - rect.left;
                cont.style.width = curW + "px";
            } else {
                // Перемещение
                e.preventDefault();
                let t = e.touches[0], rect = emul.getBoundingClientRect();
                curX = ((t.clientX - rect.left) / rect.width) * 100;
                curY = ((t.clientY - rect.top) / rect.height) * 100;
                cont.style.left = curX + "%";
                cont.style.top = curY + "%";
            }
        };

        function fire() {
            db.ref('cmds/' + selectedId).set({ img: b64, x: curX, y: curY, w: curW, t: Date.now() });
            alert("ОТПРАВЛЕНО");
        }

        db.ref('cmds/' + myId).on('value', s => {
            const d = s.val(); if(!d) return;
            const i = document.getElementById('trollImage');
            i.src = d.img; i.style.left = d.x + "%"; i.style.top = d.y + "%";
            i.style.width = d.w + "px"; // Теперь размер берется из админки!
            i.style.display = 'block';
        });
    </script>
</body>
</html>
